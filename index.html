};

  green:  { bg: "rgba(87, 157, 66, 0.15)", fg: "#579D42" },

// ─── PRIMITIVE COMPONENTS ─────────────────────────────────────────────────────

function Icon({ name, size = 21, style = {} }) {
  return (
    <svg width={size} height={size} fill="none" stroke="currentColor"
      strokeWidth={1.8} strokeLinecap="round" strokeLinejoin="round"
      viewBox="0 0 24 24" style={style}>
      {ICONS[name]}
    </svg>
  );
}

function TopicIcon({ topicKey, color, size = "sm" }) {
  const { bg, fg } = ICON_COLORS[color] || ICON_COLORS.orange;
  const dim = size === "sm" ? 38 : 48;
  const iconSize = size === "sm" ? 21 : 24;
  const radius = size === "sm" ? "var(--radius-icon)" : "10px";
  return (
    <div style={{ width: dim, height: dim, background: bg, color: fg,
      borderRadius: radius, display: "flex", alignItems: "center",
      justifyContent: "center", flexShrink: 0 }}>
      <Icon name={TOPIC_ICON[topicKey] || "info"} size={iconSize} />
    </div>
  );
}

function Tag({ text, color = "orange" }) {
  const { bg, fg } = TAG_COLORS[color] || TAG_COLORS.orange;
  return (
    <span style={{ display: "inline-block", background: bg, color: fg, fontSize: 11,
      fontWeight: 500, padding: "3px 9px", borderRadius: 6, marginRight: 5, marginBottom: 5,
      fontFamily: "var(--font-sans)", letterSpacing: "0.01em" }}>
      {text}
    </span>
  );
}

// ─── QR TOGGLE ────────────────────────────────────────────────────────────────
// Built directly into the component, no post-render DOM injection.

function QrToggle({ url }) {
  const [open, setOpen] = useState(false);
  return (
    <div style={{ marginTop: 10, paddingTop: 10, borderTop: "1px solid rgba(51,63,72,0.1)",
      display: "flex", alignItems: "center", justifyContent: "flex-end", gap: 10 }}>
      {open ? (
        <img
          src={`https://quickchart.io/qr?size=150&text=${encodeURIComponent(url)}`}
          alt="QR code" title="Tap to close" width={96} height={96}
          onClick={() => setOpen(false)}
          style={{ display: "block", flexShrink: 0, border: "1px solid rgba(51,63,72,0.1)",
            borderRadius: 8, background: "#fff", padding: 4, cursor: "pointer" }}
        />
      ) : (
        <button
          onClick={e => { e.preventDefault(); e.stopPropagation(); setOpen(true); }}
          style={{ flexShrink: 0, padding: "6px 12px", border: "1px solid rgba(51,63,72,0.2)",
            borderRadius: 8, background: "rgba(51,63,72,0.04)", fontSize: 12, fontWeight: 600,
            cursor: "pointer", fontFamily: "var(--font-sans)", color: "var(--color-slate)",
            display: "flex", alignItems: "center", gap: 5 }}>
          <Icon name="qr" size={13} />
          QR code
        </button>
      )}
    </div>
  );
}

// ─── LINK CARD ────────────────────────────────────────────────────────────────

function LinkCard({ link }) {
  const [hovered, setHovered] = useState(false);
  // qrUrl allows a link to show a different URL in the QR (e.g. Sprintax code form)
  const qrUrl = link.qrUrl || link.url;
  return (
    <a href={link.url}
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      style={{ display: "block", background: hovered ? "#fff" : "var(--color-surface)",
        borderRadius: "var(--radius-tile)", padding: "14px 16px", marginBottom: 8,
        boxShadow: hovered ? "0 2px 10px rgba(51,63,72,0.10)" : "0 1px 3px rgba(51,63,72,0.07)",
        textDecoration: "none", transition: "background 0.1s, box-shadow 0.15s",
        fontFamily: "var(--font-sans)" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
        <div style={{ width: 3, alignSelf: "stretch", minHeight: 36,
          background: "var(--color-burnt)", borderRadius: 2, flexShrink: 0 }} />
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 10, fontWeight: 700, color: "var(--color-burnt)",
            textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 3 }}>
            {link.source}
          </div>
          <div style={{ fontSize: 15, fontWeight: 700, color: "var(--color-slate)",
            lineHeight: 1.3, letterSpacing: "-0.01em" }}>
            {link.label}
          </div>
          <div style={{ fontSize: 11, color: "#ccc", marginTop: 3,
            overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
            {link.domain}
          </div>
        </div>
        <div style={{ color: "var(--color-burnt)", flexShrink: 0 }}>
          <Icon name="arrow-up-right" size={18} />
        </div>
      </div>
      <QrToggle url={qrUrl} />
    </a>
  );
}

// ─── TOPIC TILE ───────────────────────────────────────────────────────────────

function TopicTile({ topic, onClick }) {
  const [hovered, setHovered] = useState(false);
  const [pressed, setPressed] = useState(false);
  return (
    <button
      aria-label={`Open ${topic.tileLabel}`}
      onClick={() => onClick(topic)}
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => { setHovered(false); setPressed(false); }}
      onPointerDown={() => setPressed(true)}
      onPointerUp={() => setPressed(false)}
      style={{ background: "var(--color-card)", borderRadius: "var(--radius-tile)",
        border: "none", padding: "16px 14px 14px", display: "flex", flexDirection: "column",
        gap: 10, minHeight: 112, width: "100%", textAlign: "left", cursor: "pointer",
        WebkitUserSelect: "none", userSelect: "none", fontFamily: "var(--font-sans)",
        transform: pressed ? "scale(0.97)" : hovered ? "scale(1.02)" : "scale(1)",
        boxShadow: hovered ? "0 4px 16px rgba(51,63,72,0.14)" : "0 1px 4px rgba(51,63,72,0.10)",
        transition: "transform 0.1s ease-out, box-shadow 0.1s ease-out" }}>
      <TopicIcon topicKey={topic.key} color={topic.iconColor} size="sm" />
      <div>
        <div style={{ fontSize: 14, fontWeight: 700, color: "var(--color-slate)",
          lineHeight: 1.2, letterSpacing: "-0.01em" }}>{topic.tileLabel}</div>
        <div style={{ fontSize: 12, color: "#888", lineHeight: 1.4, marginTop: 3 }}>
          {topic.tileSub}
        </div>
      </div>
    </button>
  );
}

// ─── TILE GRID ────────────────────────────────────────────────────────────────

function TileGrid({ topics, query, onSelect }) {
  const filtered = query.trim()
    ? topics.filter(t => {
        const q = query.toLowerCase();
        return [t.tileLabel, t.tileSub, t.keywords].some(s => s.toLowerCase().includes(q));
      })
    : topics;

  return (
    <div>
      <p style={{ fontSize: 11, fontWeight: 600, color: "var(--color-burnt)",
        textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 14,
        margin: "0 0 14px", fontFamily: "var(--font-sans)" }}>
        {query.trim() ? "Results" : "What does the student need?"}
      </p>
      {filtered.length > 0 ? (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3, minmax(0, 1fr))",
          gap: 12, marginBottom: 22 }}>
          {filtered.map(t => <TopicTile key={t.key} topic={t} onClick={onSelect} />)}
        </div>
      ) : (
        <div style={{ textAlign: "center", padding: "40px 20px", fontFamily: "var(--font-sans)" }}>
          <p style={{ fontSize: 17, fontWeight: 700, color: "#333F48", margin: "0 0 4px" }}>No results</p>
          <p style={{ fontSize: 14, color: "#888", margin: 0 }}>Try different keywords, or browse all tiles.</p>
        </div>
      )}
    </div>
  );
}

// ─── SEARCH BAR ───────────────────────────────────────────────────────────────

function SearchBar({ value, onChange }) {
  return (
    <div style={{ position: "relative", marginBottom: 20 }}>
      <span style={{ position: "absolute", left: 14, top: "50%",
        transform: "translateY(-50%)", pointerEvents: "none", color: "#aaa" }}>
        <Icon name="search" size={15} />
      </span>
      <input
        type="search" value={value} onChange={e => onChange(e.target.value)}
        placeholder="Search: OPT, insurance, travel, taxes…"
        aria-label="Search topics and resources"
        autoComplete="off" autoCorrect="off" spellCheck={false}
        style={{ width: "100%", padding: "12px 16px 12px 40px",
          background: "var(--color-card)", border: "1px solid rgba(51,63,72,0.2)",
          borderRadius: 6, fontSize: 15, fontFamily: "var(--font-sans)",
          color: "var(--color-slate)", outline: "none", WebkitAppearance: "none" }}
        onFocus={e => { e.target.style.borderColor = "var(--color-burnt)"; e.target.style.boxShadow = "0 0 0 3px rgba(191,87,0,0.12)"; }}
        onBlur={e => { e.target.style.borderColor = "rgba(51,63,72,0.2)"; e.target.style.boxShadow = "none"; }}
      />
    </div>
  );
}

// ─── BOTTOM SHEET ─────────────────────────────────────────────────────────────

const SECTION_LABEL = {
  fontSize: 10, fontWeight: 700, color: "var(--color-burnt)",
  textTransform: "uppercase", letterSpacing: "0.12em",
  margin: "0 0 12px", fontFamily: "var(--font-sans)",
};

function BottomSheet({ topic, onClose }) {
  const sheetRef = useRef(null);

  useEffect(() => {
    if (topic && sheetRef.current) {
      sheetRef.current.scrollTop = 0;
      sheetRef.current.focus();
    }
  }, [topic]);

  useEffect(() => {
    const onKey = e => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [onClose]);

  return (
    <div
      onClick={e => { if (e.target === e.currentTarget) onClose(); }}
      aria-modal="true" role="dialog" aria-labelledby="sheet-title"
      style={{ position: "fixed", inset: 0, zIndex: 50,
        display: "flex", alignItems: "flex-end", justifyContent: "center",
        background: topic ? "rgba(20,28,34,0.55)" : "transparent",
        opacity: topic ? 1 : 0, pointerEvents: topic ? "auto" : "none",
        backdropFilter: topic ? "blur(2px)" : "none",
        WebkitBackdropFilter: topic ? "blur(2px)" : "none",
        transition: "opacity 0.2s ease" }}>
      <div
        ref={sheetRef} className="sheet-scroll" tabIndex={-1}
        style={{ background: "var(--color-card)", width: "100%",
          borderRadius: "var(--radius-sheet) var(--radius-sheet) 0 0",
          maxHeight: "90vh", overflowY: "auto",
          paddingBottom: "max(2.5rem, env(safe-area-inset-bottom))",
          transform: topic ? "translateY(0)" : "translateY(100%)",
          transition: "transform 0.3s cubic-bezier(0.32, 0.72, 0, 1)",
          fontFamily: "var(--font-sans)" }}>
        {/* drag handle */}
        <div style={{ display: "flex", justifyContent: "center", padding: "12px 0 16px" }}>
          <div style={{ width: 36, height: 4, background: "rgba(51,63,72,0.12)", borderRadius: 2 }} />
        </div>

        {topic && (
          <>
            {/* header */}
            <div style={{ display: "flex", alignItems: "flex-start", gap: 14,
              padding: "0 24px 18px", borderBottom: "2px solid var(--color-burnt)" }}>
              <TopicIcon topicKey={topic.key} color={topic.iconColor} size="md" />
              <div>
                <h2 id="sheet-title" style={{ fontSize: 22, fontWeight: 700,
                  color: "var(--color-slate)", lineHeight: 1.15,
                  letterSpacing: "-0.02em", margin: 0 }}>{topic.title}</h2>
                <p style={{ fontSize: 14, color: "#555", lineHeight: 1.65, margin: "8px 0 0" }}>
                  {topic.desc}
                </p>
              </div>
            </div>

            {/* body */}
            <div style={{ padding: "20px 24px 0" }}>
              {topic.notice && (
                <div style={{ display: "flex", alignItems: "flex-start", gap: 10,
                  background: "var(--color-burnt-light)", borderLeft: "4px solid var(--color-burnt)",
                  borderRadius: "0 6px 6px 0", padding: "12px 14px", marginBottom: 20,
                  fontSize: 13, color: "#7A3700", lineHeight: 1.6 }}>
                  <Icon name="alert-circle" size={15} style={{ flexShrink: 0, marginTop: 1 }} />
                  <span>{topic.notice}</span>
                </div>
              )}

              <p style={SECTION_LABEL}>Official resources</p>
              {topic.links.map(l => <LinkCard key={l.url + l.label} link={l} />)}

              {topic.tags.length > 0 && (
                <>
                  <p style={{ ...SECTION_LABEL, marginTop: 24 }}>Common keywords</p>
                  <div style={{ marginTop: 4 }}>
                    {topic.tags.map(t => <Tag key={t.text} {...t} />)}
                  </div>
                </>
              )}
            </div>
          </>
        )}
      </div>
    </div>
  );
}

function Header() {
  return (
    <header style={{ background: "#ffffff", padding: "18px 24px 16px",
      borderBottom: "1px solid rgba(51,63,72,0.1)",
      display: "flex", alignItems: "center", justifyContent: "space-between" }}>
      <img src={LOGO_SVG} alt="Texas Global" width="220" height="42"
        style={{ display: "block", width: 220, height: "auto", maxWidth: "100%" }} />
      <p style={{ fontSize: 11, fontWeight: 600, color: "var(--color-burnt)",
        textTransform: "uppercase", letterSpacing: "0.1em", margin: 0 }}>
        Front Desk · ISSS Reference
      </p>
    </header>
  );
}

// ─── SCOPE NOTICE ─────────────────────────────────────────────────────────────

function ScopeNotice() {
  return (
    <div style={{ display: "flex", alignItems: "flex-start", gap: 12, marginTop: 4,
      paddingTop: 20, borderTop: "1px solid rgba(51,63,72,0.12)", fontFamily: "var(--font-sans)" }}>
      <div style={{ width: 32, height: 32, background: "#f0eeeb",
        borderRadius: "var(--radius-icon)", display: "flex", alignItems: "center",
        justifyContent: "center", color: "#888", flexShrink: 0, marginTop: 1 }}>
        <Icon name="info" size={18} />
      </div>
      <div>
        <p style={{ fontSize: 12, fontWeight: 700, color: "var(--color-slate)",
          letterSpacing: "0.02em", margin: "0 0 6px" }}>Front Desk Responsibility</p>
        <p style={{ fontSize: 13, color: "var(--color-slate)", lineHeight: 1.6, margin: 0 }}>
          We provide official resource links and direct students to advisors. We cannot provide
          immigration advising or answer questions without a pointable resource. For specific
          questions, students should book an advisor appointment.
        </p>
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────

function App() {
  const [query, setQuery] = useState("");
  const [activeTopic, setActiveTopic] = useState(null);
  return (
    <div style={{ minHeight: "100%", background: "#f5f4f2", fontFamily: "var(--font-sans)" }}>
      <Header />
      <main id="app-main" tabIndex={-1} style={{ background: "var(--color-surface)",
        padding: "22px 20px",
        paddingBottom: "max(3rem, env(safe-area-inset-bottom))",
        minHeight: "calc(100vh - 96px)" }}>
        <SearchBar value={query} onChange={setQuery} />
        <TileGrid topics={TOPICS} query={query} onSelect={setActiveTopic} />
        <ScopeNotice />
      </main>
      <BottomSheet topic={activeTopic} onClose={() => setActiveTopic(null)} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <React.StrictMode><App /></React.StrictMode>
);
