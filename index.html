// ─── PRIMITIVE COMPONENTS ─────────────────────────────────────────────────────

function Icon({ name, size = 21, style = {} }) {
  return (
    <svg width={size} height={size} fill="none" stroke="currentColor"
      strokeWidth={1.8} strokeLinecap="round" strokeLinejoin="round"
      viewBox="0 0 24 24" style={style}>
      {ICONS[name]}
    </svg>
  );
}

function TopicIcon({ topicKey, color, size = "sm" }) {
  const { bg, fg } = ICON_COLORS[color] || ICON_COLORS.orange;
  const dim = size === "sm" ? 38 : 48;
  const iconSize = size === "sm" ? 21 : 24;
  const radius = size === "sm" ? "var(--radius-icon)" : "10px";
  return (
    <div style={{ width: dim, height: dim, background: bg, color: fg,
      borderRadius: radius, display: "flex", alignItems: "center",
      justifyContent: "center", flexShrink: 0 }}>
      <Icon name={TOPIC_ICON[topicKey] || "info"} size={iconSize} />
    </div>
  );
}

function Tag({ text, color = "orange" }) {
  const { bg, fg } = TAG_COLORS[color] || TAG_COLORS.orange;
  return (
    <span style={{ display: "inline-block", background: bg, color: fg, fontSize: 11,
      fontWeight: 500, padding: "3px 9px", borderRadius: 6, marginRight: 5, marginBottom: 5,
      fontFamily: "var(--font-sans)", letterSpacing: "0.01em" }}>
      {text}
    </span>
  );
}

// ─── CONTACT GLANCE (shared grid for sheet + link quick view) ────────────────

function ContactGlanceGrid({ blocks }) {
  return (
    <div
      role="group"
      aria-label="ISSS contact details"
      style={{
        display: "grid",
        gridTemplateColumns: "repeat(auto-fill, minmax(152px, 1fr))",
        gap: 10,
      }}>
      {blocks.map(block => (
        <div
          key={block.title}
          style={{
            minWidth: 0,
            borderRadius: 10,
            border: "1px solid rgba(51,63,72,0.1)",
            borderLeft: "3px solid var(--color-burnt)",
            background: "rgba(191, 87, 0, 0.06)",
            padding: "10px 12px 11px",
          }}>
          <div style={{
            fontSize: 10,
            fontWeight: 700,
            color: "#BF5700",
            textTransform: "uppercase",
            letterSpacing: "0.1em",
            marginBottom: 6,
          }}>{block.title}</div>
          {block.items.map(line => (
            <div key={line} style={{
              fontSize: 13,
              fontWeight: 600,
              color: "var(--color-slate)",
              lineHeight: 1.45,
              wordBreak: "break-word",
            }}>{line}</div>
          ))}
        </div>
      ))}
    </div>
  );
}

function detailColumnsUseContactCardGrid(detailColumns) {
  if (!detailColumns || detailColumns.length < 3) return false;
  const last = detailColumns[detailColumns.length - 1];
  if (last.title !== "QR") return false;
  const rest = detailColumns.slice(0, -1);
  if (rest[0].title !== "Address") return false;
  return rest.every(c => Array.isArray(c.items) && c.items.length >= 1 && c.items.length <= 4);
}

function getQrFootnoteFromColumns(detailColumns) {
  if (!detailColumns || !detailColumns.length) return null;
  const last = detailColumns[detailColumns.length - 1];
  if (last.title !== "QR" || !Array.isArray(last.items) || !last.items.length) return null;
  const text = last.items.map(s => String(s).trim()).filter(Boolean).join(" ");
  return text || null;
}

function formatQrFootnote(raw) {
  if (raw == null || raw === "") return "";
  return String(raw).replace(/\.+$/, "").trim();
}

function defaultQrFootnote(qrUrl, cardUrl, linkLabel) {
  if (cardUrl && qrUrl !== cardUrl) {
    return "Different URL than card (booking or myIO).";
  }
  const label = (linkLabel || "").trim();
  if (label) return label;
  return "Same page as card.";
}

// ─── QR TOGGLE ────────────────────────────────────────────────────────────────
// Built directly into the component, no post-render DOM injection.

function QrToggle({ url, cardUrl, linkLabel, detail, detailColumns, isOpen, onToggle }) {
  const onSectionClick = e => {
    e.preventDefault();
    e.stopPropagation();
    onToggle();
  };
  const onSectionKeyDown = e => {
    if (e.key === "Enter" || e.key === " ") {
      e.preventDefault();
      e.stopPropagation();
      onToggle();
    }
  };
  return (
    <div
      role="button"
      tabIndex={0}
      aria-expanded={isOpen}
      aria-label={isOpen ? "Hide quick view (QR and details)" : "Show quick view (QR and details)"}
      title={isOpen ? "Tap anywhere in this section to hide quick view" : "Tap anywhere in this section for quick view"}
      onClick={onSectionClick}
      onKeyDown={onSectionKeyDown}
      style={{
        marginTop: 10, marginLeft: -16, marginRight: -16, marginBottom: -14,
        padding: "10px 16px 14px", borderTop: "1px solid rgba(51,63,72,0.1)",
        cursor: "pointer", color: "var(--color-slate)",
        WebkitTapHighlightColor: "transparent",
      }}>
      {!isOpen && (
        <div style={{ display: "flex", alignItems: "center", justifyContent: "flex-end", minHeight: 28 }}>
          <Icon name="qr" size={22} style={{ pointerEvents: "none" }} aria-hidden />
        </div>
      )}
      {isOpen && (() => {
        const useContactCards = detailColumns && detailColumnsUseContactCardGrid(detailColumns);
        const infoBlocks = useContactCards ? detailColumns.slice(0, -1) : null;
        const columnsForList = detailColumns && !useContactCards
          ? detailColumns.filter(c => c.title !== "QR")
          : [];
        const qrFootnote = formatQrFootnote(
          getQrFootnoteFromColumns(detailColumns)
            || defaultQrFootnote(url, cardUrl, linkLabel));
        return (
        <div style={{ marginTop: 0, display: "grid", gridTemplateColumns: "1fr 108px", gap: 10, alignItems: "start" }}>
          <div style={{ fontSize: 12, color: "#666", lineHeight: 1.5, minWidth: 0 }}>
            {detailColumns ? (
              useContactCards ? (
                <ContactGlanceGrid blocks={infoBlocks} />
              ) : (
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                  {columnsForList.map(col => (
                    <div key={col.title}>
                      <div style={{ fontWeight: 700, color: "var(--color-slate)", marginBottom: 4 }}>{col.title}</div>
                      <ul style={{ margin: 0, paddingLeft: 18 }}>
                        {col.items.map(item => <li key={item}>{item}</li>)}
                      </ul>
                    </div>
                  ))}
                </div>
              )
            ) : (
              detail || "Same page as this card"
            )}
          </div>
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 4,
            flexShrink: 0, width: 108, minWidth: 108 }}>
            <img
              src={`https://quickchart.io/qr?size=150&text=${encodeURIComponent(url)}`}
              alt="" width={96} height={96}
              style={{ display: "block", border: "1px solid rgba(51,63,72,0.1)",
                borderRadius: 8, background: "#fff", padding: 4, pointerEvents: "none" }}
            />
            <span style={{
              fontSize: 9, color: "#888", textAlign: "center", lineHeight: 1.25, width: "100%",
              wordBreak: "break-word",
            }}>{qrFootnote}</span>
          </div>
        </div>
        );
      })()}
    </div>
  );
}

// ─── LINK CARD ────────────────────────────────────────────────────────────────

function LinkCard({ link }) {
  const [hovered, setHovered] = useState(false);
  // qrUrl allows a link to show a different URL in the QR (e.g. Sprintax code form)
  const qrUrl = link.qrUrl || link.url;
  return (
    <a href={link.url}
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      style={{ display: "block", background: hovered ? "#fff" : "var(--color-surface)",
        borderRadius: "var(--radius-tile)", padding: "14px 16px", marginBottom: 8,
        boxShadow: hovered ? "0 2px 10px rgba(51,63,72,0.10)" : "0 1px 3px rgba(51,63,72,0.07)",

      <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
        <div style={{ width: 3, alignSelf: "stretch", minHeight: 36,
          background: "var(--color-burnt)", borderRadius: 2, flexShrink: 0 }} />
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 10, fontWeight: 700, color: "var(--color-burnt)",
            textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 3 }}>
            {link.source}
          </div>
          <div style={{ fontSize: 15, fontWeight: 700, color: "var(--color-slate)",
            lineHeight: 1.3, letterSpacing: "-0.01em" }}>
            {link.label}
          </div>
          <div style={{ fontSize: 11, color: "#ccc", marginTop: 3,
            overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
            {link.domain}
          </div>
        </div>

          <Icon name="arrow-up-right" size={18} />
        </div>

        url={qrUrl}

}

function TopicTile({ topic, onClick }) {

function TileGrid({ topics, query, onSelect }) {
  const filtered = query.trim()
    ? topics.filter(t => {
        const q = query.toLowerCase();
        return [t.tileLabel, t.tileSub, t.keywords].some(s => s.toLowerCase().includes(q));
      })
    : topics;

  return (
    <div style={{ flex: 1, minHeight: 0, display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <p style={{ fontSize: 11, fontWeight: 600, color: "var(--color-burnt)",
        textTransform: "uppercase", letterSpacing: "0.08em",
        margin: "0 0 10px", flexShrink: 0, fontFamily: "var(--font-sans)" }}>
        {query.trim() ? "Results" : "What does the student need?"}

        <div className="tile-grid">

        <div style={{ flex: 1, minHeight: 0, display: "flex", flexDirection: "column",

// ─── BOTTOM SHEET ─────────────────────────────────────────────────────────────

const SECTION_LABEL = {
  fontSize: 10, fontWeight: 700, color: "var(--color-burnt)",
  textTransform: "uppercase", letterSpacing: "0.12em",
  margin: "0 0 12px", fontFamily: "var(--font-sans)",
};

function BottomSheet({ topic, onClose }) {
  const sheetRef = useRef(null);
  const dragRef = useRef({ active: false, startY: 0, currentDy: 0 });
  const [dragOffset, setDragOffset] = useState(0);
  const [isDragging, setIsDragging] = useState(false);
  const [openQuickViewKey, setOpenQuickViewKey] = useState(null);

  useEffect(() => {
    if (topic && sheetRef.current) {
      sheetRef.current.scrollTop = 0;
      sheetRef.current.focus();
    }
  }, [topic]);

  useEffect(() => {
    const onKey = e => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [onClose]);

  useEffect(() => {
    if (!topic) {
      dragRef.current.active = false;
      setIsDragging(false);
      setDragOffset(0);
      setOpenQuickViewKey(null);
    }
  }, [topic]);

  useEffect(() => {
    const onPointerMove = e => {
      if (!dragRef.current.active) return;
      e.preventDefault();
      const delta = Math.max(0, e.clientY - dragRef.current.startY);
      dragRef.current.currentDy = delta;
      setDragOffset(delta);
    };
    const endDrag = () => {
      if (!dragRef.current.active) return;
      dragRef.current.active = false;
      setIsDragging(false);
      const dy = dragRef.current.currentDy;
      if (dy > 110) {
        onClose();
      } else {
        dragRef.current.currentDy = 0;
        setDragOffset(0);
      }
    };
    window.addEventListener("pointermove", onPointerMove, { passive: false });
    window.addEventListener("pointerup", endDrag);
    window.addEventListener("pointercancel", endDrag);
    return () => {
      window.removeEventListener("pointermove", onPointerMove);
      window.removeEventListener("pointerup", endDrag);
      window.removeEventListener("pointercancel", endDrag);
    };
  }, [onClose]);

  const startDrag = e => {
    if (!topic) return;
    dragRef.current.active = true;
    dragRef.current.startY = e.clientY;
    dragRef.current.currentDy = 0;
    setIsDragging(true);
    setDragOffset(0);
  };

  const handleQuickViewToggle = linkKey => {
    setOpenQuickViewKey(prev => (prev === linkKey ? null : linkKey));
  };

  return (
    <div
      onClick={e => { if (e.target === e.currentTarget) onClose(); }}
      aria-modal="true" role="dialog" aria-labelledby="sheet-title"
      style={{ position: "fixed", inset: 0, zIndex: 50,
        display: "flex", alignItems: "flex-end", justifyContent: "center",
        background: topic ? "rgba(20,28,34,0.55)" : "transparent",
        opacity: topic ? Math.max(0, 1 - dragOffset / 220) : 0, pointerEvents: topic ? "auto" : "none",
        backdropFilter: topic ? "blur(2px)" : "none",
        WebkitBackdropFilter: topic ? "blur(2px)" : "none",
        transition: "opacity 0.2s ease" }}>
      <div
        style={{ background: "var(--color-card)", width: "100%",
          borderRadius: "var(--radius-sheet) var(--radius-sheet) 0 0",
          maxHeight: "90vh", overflow: "hidden", display: "flex", flexDirection: "column",
          transform: topic ? `translateY(${dragOffset}px)` : "translateY(100%)",
          transition: isDragging ? "none" : "transform 0.3s cubic-bezier(0.32, 0.72, 0, 1)",
          fontFamily: "var(--font-sans)" }}>
        {/* drag handle */}
        <div
          onPointerDown={startDrag}
          style={{ display: "flex", justifyContent: "center", padding: "12px 0 16px",
            touchAction: "none", cursor: isDragging ? "grabbing" : "grab" }}>
          <div style={{ width: 36, height: 4, background: "rgba(51,63,72,0.12)", borderRadius: 2 }} />
        </div>

        <div
          ref={sheetRef} className="sheet-scroll" tabIndex={-1}
          style={{ overflowY: "auto", flex: 1,
            paddingBottom: "max(2.5rem, env(safe-area-inset-bottom))" }}>
          {topic && (
            <>
              {/* header */}
              <div style={{ display: "flex", alignItems: "flex-start", gap: 14,
                padding: "0 24px 18px", borderBottom: "2px solid var(--color-burnt)" }}>
                <TopicIcon topicKey={topic.key} color={topic.iconColor} size="md" />
                <div>
                  <h2 id="sheet-title" style={{ fontSize: 22, fontWeight: 700,
                    color: "var(--color-slate)", lineHeight: 1.15,
                    letterSpacing: "-0.02em", margin: 0 }}>{topic.title}</h2>
                  <p style={{ fontSize: 14, color: "#555", lineHeight: 1.65, margin: "8px 0 0" }}>
                    {topic.desc}
                  </p>
                </div>
              </div>

              {/* body */}
              <div style={{ padding: "20px 24px 0" }}>
                {topic.notice && (
                  <div style={{ display: "flex", alignItems: "flex-start", gap: 10,
                    background: "var(--color-burnt-light)", borderLeft: "4px solid var(--color-burnt)",
                    borderRadius: "0 6px 6px 0", padding: "12px 14px", marginBottom: 20,
                    fontSize: 13, color: "#7A3700", lineHeight: 1.6 }}>
                    <Icon name="alert-circle" size={15} style={{ flexShrink: 0, marginTop: 1 }} />
                    <span>{topic.notice}</span>
                  </div>
                )}

                <p style={SECTION_LABEL}>Official resources</p>
                {topic.links.map((l, idx) => {
                  const linkKey = l.url + l.label;
                  const pageSummary = topic.pageContents && topic.pageContents[idx];
                  const linkDetailColumns = l.detailColumns || buildFallbackQuickView(l, pageSummary, topic.key);
                  const linkDetail = l.detail || (!linkDetailColumns && pageSummary ? pageSummary : undefined);
                  return (
                    <div key={linkKey} style={{ marginBottom: 10 }}>
                      <LinkCard
                        link={{
                          ...l,
                          detailColumns: linkDetailColumns,
                          detail: linkDetail,
                          quickViewOpen: openQuickViewKey === linkKey,
                          onToggleQuickView: () => handleQuickViewToggle(linkKey),
                        }}
                      />
                    </div>
                  );
                })}

              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );

  phoneDisplay: "(512) 471-2477",

function Header() {
  const contactLineStyle = {
    display: "block",
    fontSize: 12,

    color: "var(--color-slate)",
    marginTop: 4,
    lineHeight: 1.35,
    wordBreak: "break-all" };
  return (
    <header style={{ background: "#ffffff", width: "100%", flexShrink: 0,

      <div style={{ ...pageAlignStyle, display: "flex", alignItems: "flex-start",

        <div style={{ textAlign: "right", minWidth: 0, flex: "0 1 auto" }}>
          <p style={{ fontSize: 11, fontWeight: 600, color: "var(--color-burnt)",

            ISSS · Official resource links

// ─── SCOPE NOTICE ─────────────────────────────────────────────────────────────

function ScopeNotice() {
  return (
    <div style={{ display: "flex", alignItems: "flex-start", gap: 10, marginTop: 0,
      paddingTop: 12, flexShrink: 0, borderTop: "1px solid rgba(51,63,72,0.12)", fontFamily: "var(--font-sans)" }}>
      <div style={{ width: 32, height: 32, background: "#f0eeeb",
        borderRadius: "var(--radius-icon)", display: "flex", alignItems: "center",
        justifyContent: "center", color: "#888", flexShrink: 0, marginTop: 1 }}>
        <Icon name="info" size={18} />
      </div>
      <div>
        <p style={{ fontSize: 12, fontWeight: 700, color: "var(--color-slate)",
          letterSpacing: "0.02em", margin: "0 0 6px" }}>About this page</p>
        <p style={{ fontSize: 12, color: "var(--color-slate)", lineHeight: 1.45, margin: 0 }}>
          This tool lists official ISSS and campus links. It does not replace individualized
          immigration advising. If your question depends on your personal situation, book an
          appointment with an international student advisor.
        </p>
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────

function App() {
  const [query, setQuery] = useState("");
  const [activeTopic, setActiveTopic] = useState(null);
  return (
    <div style={{
      height: "100%",
      background: "#f5f4f2",
      fontFamily: "var(--font-sans)",
      paddingLeft: "max(0px, env(safe-area-inset-left))",
      paddingRight: "max(0px, env(safe-area-inset-right))",
      display: "flex",
      flexDirection: "column",
      overflow: "hidden",
    }}>
      <Header />
      <main id="app-main" tabIndex={-1} style={{ background: "var(--color-surface)",
        width: "100%",
        flex: 1,
        minHeight: 0,
        display: "flex",
        flexDirection: "column",
        overflow: "hidden",
        paddingTop: 16,
        paddingBottom: "max(10px, env(safe-area-inset-bottom))" }}>
        <div style={{
          ...pageAlignStyle,
          flex: 1,
          minHeight: 0,
          display: "flex",
          flexDirection: "column",
          overflow: "hidden",
        }}>
          <SearchBar value={query} onChange={setQuery} />
          <TileGrid topics={TOPICS} query={query} onSelect={setActiveTopic} />
          <ScopeNotice />
        </div>
      </main>
      <BottomSheet topic={activeTopic} onClose={() => setActiveTopic(null)} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <React.StrictMode><App /></React.StrictMode>
