  <body>
    <a class="skip-link" href="#app-main">Skip to main content</a>
    <div id="root"></div>
    <script>
      (function () {
        const targetHref = 'https://studyinthestates.dhs.gov/'
        const newHref = 'https://studyinthestates.dhs.gov/sevis-help-hub/student-records/fm-student-employment/f-1-optional-practical-training-opt'
        const newLabel = 'F-1 optional practical training — SEVIS Help Hub'
        const hotlineMailtoHref = 'mailto:hotline@austin.utexas.edu'
        const contactHref = 'https://global.utexas.edu/isss/about/contact'
        const ssnHref = 'https://global.utexas.edu/isss/life-at-ut/ssn'
        const studyAbroadScholarshipsHref = 'https://global.utexas.edu/abroad/funding/scholarships'
        const isssScholarshipsHref = 'https://global.utexas.edu/isss/advising-services/scholarships'
        const sprintaxCodeCardHref = 'https://global.utexas.edu/isss/advising-services/taxes/tax-preparation-software'
        const sprintaxCodeQrHref = 'https://isss.io.utexas.edu/istart/controllers/client/ClientEngine.cfm?menuFlag=true&serviceid=EFormGTPAccessCode0ServiceProvider'
        const beforeTravelHref = 'https://global.utexas.edu/isss/immigration/before-travel'
        const i515aOverviewHref = 'https://studyinthestates.dhs.gov/students/travel/form-i-515a-overview'
        const i94OfficialHref = 'https://i94.cbp.dhs.gov/home'
        const oldLabels = new Set([
          'Is this job permissible for OPT?',
          'F-1 OPT guidance (SEVIS Help Hub)',
          'F-1 optional practical training — SEVIS Help Hub',
        ])
        const FUNDING_LABEL_VARIANTS = [
          'Education abroad scholarships',
          'Scholarships & education abroad funding',
          'Study abroad scholarships & funding',
          'Education abroad scholarships & funding',
        ]
        const TARGET_REL_VALUES = new Set(['noopener noreferrer', 'noreferrer noopener', 'noopener', 'noreferrer'])
        const findNodeByText = (root, text) => Array.from(root.querySelectorAll('div,span')).find((node) => (node.textContent?.trim() || '') === text)
        const setTextIfChanged = (node, text) => {
          if (!node) return
          if ((node.textContent || '') !== text) node.textContent = text
        }
        const findFirstNodeByTexts = (root, texts) => texts.map((text) => findNodeByText(root, text)).find(Boolean) || null
        const findLeafTextNode = (selector, predicate) => {
          return Array.from(document.querySelectorAll(selector)).find((node) => !node.querySelector(selector) && predicate((node.textContent?.trim() || '').toLowerCase()))
        }
        const findEyebrowSourceNode = (card) => {
          return Array.from(card.querySelectorAll('div,span')).find((node) => {
            if (node.querySelector('div,span')) return false
            const s = (node.textContent?.trim() || '').toLowerCase()
            return (
              s === 'texas global'
              || s === 'education abroad · texas global'
              || s === 'isss · texas global'
              || s === 'study abroad · texas global'
            )
          })
        }
        const isGlobalAbroadHref = (href) => href.includes('global.utexas.edu') && href.includes('/abroad')
        const getViewportInfo = () => {
          const width = window.innerWidth || 0
          const touchPoints = navigator.maxTouchPoints || 0
          const hasTouch = touchPoints > 1 || 'ontouchstart' in window
          const isTabletWidth = width >= 744 && width <= 1366
          const isPortrait = window.matchMedia && window.matchMedia('(orientation: portrait)').matches
          return {
            width,
            hasTouch,
            isPortrait,
            isTablet: isTabletWidth && hasTouch,
          }
        }
        const applyIpadResponsiveStyles = () => {
          const { isTablet, isPortrait } = getViewportInfo()
          if (!isTablet) return
          const appRoot = document.querySelector('#root > div')
          if (appRoot) appRoot.style.minHeight = '100dvh'
          const main = document.querySelector('#root > div > main')
          if (main) {
            main.style.paddingTop = isPortrait ? '24px' : '22px'
            main.style.paddingLeft = isPortrait ? '20px' : '24px'
            main.style.paddingRight = isPortrait ? '20px' : '24px'
            main.style.paddingBottom = 'max(2.75rem, env(safe-area-inset-bottom))'
            main.style.minHeight = 'calc(100dvh - 96px)'
          }
          const header = document.querySelector('#root > div > header')
          if (header) {
            header.style.paddingLeft = isPortrait ? '20px' : '24px'
            header.style.paddingRight = isPortrait ? '20px' : '24px'
            header.style.paddingTop = isPortrait ? '22px' : '24px'
          }
          document.querySelectorAll('main div').forEach((node) => {
            const el = node
            if (el.style.display !== 'grid') return
            if (!el.style.gridTemplateColumns) return
            el.style.gridTemplateColumns = isPortrait ? 'repeat(2, minmax(0, 1fr))' : 'repeat(3, minmax(0, 1fr))'
            el.style.gap = isPortrait ? '12px' : '14px'
          })
          document.querySelectorAll('main button').forEach((node) => {
            const el = node
            el.style.minHeight = isPortrait ? '118px' : '124px'
            el.style.padding = isPortrait ? '16px 14px 14px' : '17px 15px 15px'
            el.style.borderRadius = '14px'
          })
          const dialog = document.querySelector('div[role="dialog"]')
          if (dialog && dialog.firstElementChild) {
            const sheet = dialog.firstElementChild
            sheet.style.width = isPortrait ? '100%' : 'min(980px, 100%)'
            sheet.style.maxHeight = isPortrait ? '90dvh' : '88dvh'
            sheet.style.borderRadius = 'var(--radius-sheet) var(--radius-sheet) 0 0'
          }
          document.querySelectorAll('div[role="dialog"] a[href]').forEach((node) => {
            const el = node
            el.style.padding = isPortrait ? '14px 15px' : '15px 16px'
            el.style.borderRadius = '14px'
          })
        }
        const isEducationAbroadOfficialResourcesView = () => {
          if (!document.querySelector('a[href*="EducationAbroadPeerMentors"]')) return false
          return !!document.querySelector('a[href*="global.utexas.edu"][href*="/abroad"]')
        }
        const EDUCATION_ABROAD_EYEBROW = 'Education Abroad · Texas Global'
        const getDisplayUrl = (href) => {
          try {
            const parsed = new URL(href)
            return `${parsed.host}${parsed.pathname}${parsed.search}`.replace(/\/$/, '')
          } catch {
            return href
          }
        }
        const updateCardMetaFromHref = (card, href) => {
          const urlText = getDisplayUrl(href)
          const domainNode = findNodeByText(card, 'global.utexas.edu')
            || findNodeByText(card, 'outlook.office365.com')
            || findNodeByText(card, 'studyinthestates.dhs.gov')
            || findNodeByText(card, 'i94.cbp.dhs.gov')
            || findNodeByText(card, 'utdirect.utexas.edu')
            || findNodeByText(card, 'irs.gov')
            || findNodeByText(card, 'uscis.gov')
            || findNodeByText(card, 'hotline@austin.utexas.edu')
          if (domainNode) {
            setTextIfChanged(domainNode, urlText)
            domainNode.style.whiteSpace = 'nowrap'
          }
          const sourceNode = findEyebrowSourceNode(card)
          if (sourceNode) {
            if (isGlobalAbroadHref(href)) setTextIfChanged(sourceNode, EDUCATION_ABROAD_EYEBROW)
            if (href.includes('EducationAbroadPeerMentors')) setTextIfChanged(sourceNode, EDUCATION_ABROAD_EYEBROW)
          }
        }
        const styleHotlineCard = (card) => {
          card.dataset.hotlineCard = 'true'
          const textNodes = Array.from(card.querySelectorAll('div,span'))
            .filter((node) => (node.textContent?.trim() || '') && !node.querySelector('div,span'))
          const titleNode = textNodes.find((node) => {
            const text = node.textContent?.trim().toLowerCase() || ''
            return text.includes('hotline') || text === 'contact isss'
          })
          const subtitleNode = textNodes.find((node) => {
            if (node === titleNode) return false
            const text = node.textContent?.trim().toLowerCase() || ''
            return text.includes('global.utexas.edu') || text.includes('hotline@austin.utexas.edu') || text.includes('/isss/about/contact')
          })
          const eyebrowNode = textNodes.find((node) => {
            if (node === titleNode || node === subtitleNode) return false
            const text = node.textContent?.trim().toLowerCase() || ''
            return text.includes('texas global') || text.includes('isss')
          })
          if (eyebrowNode) {
            setTextIfChanged(eyebrowNode, 'ISSS')
            eyebrowNode.style.textTransform = 'uppercase'
            eyebrowNode.style.letterSpacing = '.06em'
            eyebrowNode.style.fontWeight = '600'
          }
          if (titleNode) {
            setTextIfChanged(titleNode, 'Hotline email')
            titleNode.style.fontWeight = '700'
          }
          if (subtitleNode) {
            setTextIfChanged(subtitleNode, 'hotline@austin.utexas.edu')
            subtitleNode.style.whiteSpace = 'normal'
            subtitleNode.style.wordBreak = 'break-word'
          }
        }
        const showQr = (qr) => {
          qr.style.display = 'block'
        }
        const hideQr = (qr) => {
          qr.style.display = 'none'
        }
        const closeOtherQrs = (exceptCard) => {
          document.querySelectorAll('a[data-qr-enabled="true"]').forEach((card) => {
            if (card === exceptCard) return
            card.dataset.qrOpen = 'false'
            const cardQr = card.querySelector('img[data-inline-qr="true"]')
            if (cardQr) hideQr(cardQr)
            const toggle = card.querySelector('[data-qr-toggle="true"]')
            if (toggle) toggle.style.display = ''
          })
        }
        const ensureQrToggleForCard = (card, qrHref, altText) => {
          if (!card || card.dataset.qrEnabled === 'true') return
          card.dataset.qrEnabled = 'true'
          card.dataset.qrOpen = 'false'
          const display = getComputedStyle(card).display
          if (display === 'flex' || display === 'inline-flex') {
            card.style.flexWrap = 'wrap'
          }
          const panel = document.createElement('div')
          panel.setAttribute('data-qr-panel', 'true')
          Object.assign(panel.style, {
            boxSizing: 'border-box',
            gridColumn: display === 'grid' || display === 'inline-grid' ? '1 / -1' : '',
            flex: '1 1 100%',
            width: '100%',
            minWidth: '100%',
            marginTop: '12px',
            paddingTop: '12px',
            borderTop: '1px solid rgba(51, 63, 72, 0.12)',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'flex-end',
            gap: '12px',
          })
          const toggle = document.createElement('span')
          toggle.setAttribute('data-qr-toggle', 'true')
          toggle.setAttribute('role', 'button')
          toggle.setAttribute('tabindex', '0')
          toggle.textContent = 'QR code'
          Object.assign(toggle.style, {
            flexShrink: '0',
            padding: '6px 12px',
            border: '1px solid rgba(51,63,72,0.2)',
            borderRadius: '8px',
            background: 'rgba(51,63,72,0.04)',
            fontSize: '12px',
            fontWeight: '600',
            lineHeight: '1.2',
            cursor: 'pointer',
            userSelect: 'none',
          })
          const qr = document.createElement('img')
          qr.setAttribute('data-inline-qr', 'true')
          qr.src = `https://quickchart.io/qr?size=150&text=${encodeURIComponent(qrHref)}`
          qr.alt = altText
          qr.title = 'Tap to close'
          qr.width = 96
          qr.height = 96
          Object.assign(qr.style, {
            display: 'none',
            flexShrink: '0',
            border: '1px solid rgba(51,63,72,0.1)',
            borderRadius: '8px',
            background: '#fff',
            padding: '4px',
            cursor: 'pointer',
          })
          panel.appendChild(toggle)
          panel.appendChild(qr)
          card.appendChild(panel)
          const toggleQr = (event) => {
            event.preventDefault()
            event.stopPropagation()
            const isOpening = card.dataset.qrOpen !== 'true'
            closeOtherQrs(card)
            card.dataset.qrOpen = isOpening ? 'true' : 'false'
            if (isOpening) {
              showQr(qr)
              toggle.style.display = 'none'
            } else {
              hideQr(qr)
              toggle.style.display = ''
            }
          }
          toggle.addEventListener('click', toggleQr)
          toggle.addEventListener('keydown', (event) => {
            if (event.key === 'Enter' || event.key === ' ') {
              toggleQr(event)
            }
          })
          qr.addEventListener('click', (event) => {
            event.preventDefault()
            event.stopPropagation()
            card.dataset.qrOpen = 'false'
            hideQr(qr)
            toggle.style.display = ''
          })
        }
        let isApplyingUpdate = false
        const applyUpdate = () => {
          if (isApplyingUpdate) return
          isApplyingUpdate = true
          try {
          const links = document.querySelectorAll('a[href]')
          links.forEach((a) => {
            const href = a.getAttribute('href') || ''
            const currentText = a.textContent?.trim() || ''
            if (href === targetHref || oldLabels.has(currentText)) {
              a.setAttribute('href', newHref)
              const titleNode = Array.from(a.querySelectorAll('div,span')).find((node) => oldLabels.has(node.textContent?.trim() || ''))
              if (titleNode) {
                setTextIfChanged(titleNode, newLabel)
              } else if (!a.children.length) {
                setTextIfChanged(a, newLabel)
              }
            }
            if (href === hotlineMailtoHref || currentText.includes('hotline@austin.utexas.edu')) {
              a.setAttribute('href', contactHref)
              styleHotlineCard(a)
            }
            const effectiveHref = a.getAttribute('href') || href
            const isHotlineCard = a.dataset.hotlineCard === 'true' || effectiveHref === contactHref
            if (isHotlineCard) {
              styleHotlineCard(a)
            } else {
              updateCardMetaFromHref(a, effectiveHref)
            }
          })
          if (!document.querySelector(`a[href="${i94OfficialHref}"]`)) {
            const beforeTravelCard = document.querySelector(`a[href="${beforeTravelHref}"]`)
            const i515aCard = document.querySelector(`a[href="${i515aOverviewHref}"]`)
            if (beforeTravelCard && i515aCard) {
              const i94Card = beforeTravelCard.cloneNode(true)
              i94Card.removeAttribute('data-qr-enabled')
              i94Card.removeAttribute('data-qr-open')
              i94Card.querySelectorAll('[data-qr-panel], [data-qr-toggle], img[data-inline-qr]').forEach((el) => el.remove())
              i94Card.setAttribute('href', i94OfficialHref)
              const titleNode = findNodeByText(i94Card, 'Before-travel signature info')
              if (titleNode) setTextIfChanged(titleNode, 'I-94 — official arrival record')
              const eye = findEyebrowSourceNode(i94Card) || findNodeByText(i94Card, 'ISSS · Texas Global')
              if (eye) setTextIfChanged(eye, 'CBP · DHS')
              const dom = findNodeByText(i94Card, 'global.utexas.edu')
              if (dom) setTextIfChanged(dom, 'i94.cbp.dhs.gov')
              i515aCard.insertAdjacentElement('beforebegin', i94Card)
              updateCardMetaFromHref(i94Card, i94OfficialHref)
            }
          }
          if (!document.querySelector(`a[href="${ssnHref}"]`)) {
            const stemHref = 'https://global.utexas.edu/isss/immigration/f-1/employment/stem-opt'
            const stemCard = document.querySelector(`a[href="${stemHref}"]`)
            if (stemCard) {
              const ssnCard = stemCard.cloneNode(true)
              ssnCard.setAttribute('href', ssnHref)
              const stemLabelNode = findNodeByText(ssnCard, 'STEM OPT extension (Form I-983)')
              if (stemLabelNode) setTextIfChanged(stemLabelNode, 'Apply for SSN')
              stemCard.insertAdjacentElement('afterend', ssnCard)
            }
          }
          const fundingCard = document.querySelector(`a[href="${studyAbroadScholarshipsHref}"]`)
          if (fundingCard) {
            const fundingLabelNode = findFirstNodeByTexts(fundingCard, FUNDING_LABEL_VARIANTS)
            if (fundingLabelNode) setTextIfChanged(fundingLabelNode, 'Education abroad scholarships & funding')
            const sourceNode = findEyebrowSourceNode(fundingCard)
              || findNodeByText(fundingCard, 'Education Abroad · Texas Global')
              || findNodeByText(fundingCard, 'Texas Global')
            if (sourceNode) setTextIfChanged(sourceNode, EDUCATION_ABROAD_EYEBROW)
          }
          if (!document.querySelector(`a[href="${isssScholarshipsHref}"]`)) {
            if (fundingCard) {
              const isssCard = fundingCard.cloneNode(true)
              isssCard.setAttribute('href', isssScholarshipsHref)
              const studyAbroadFundingLabelNode = findFirstNodeByTexts(isssCard, FUNDING_LABEL_VARIANTS)
              if (studyAbroadFundingLabelNode) setTextIfChanged(studyAbroadFundingLabelNode, 'ISSS scholarships')
              const sourceNode = findEyebrowSourceNode(isssCard)
                || findNodeByText(isssCard, 'Education Abroad · Texas Global')
                || findNodeByText(isssCard, 'Texas Global')
              const isssEyebrow = isEducationAbroadOfficialResourcesView() ? EDUCATION_ABROAD_EYEBROW : 'ISSS · Texas Global'
              if (sourceNode) setTextIfChanged(sourceNode, isssEyebrow)
              fundingCard.insertAdjacentElement('afterend', isssCard)
            }
          }
          if (isEducationAbroadOfficialResourcesView()) {
            const unifyCardEyebrow = (a) => {
              const node = findEyebrowSourceNode(a)
              if (node) setTextIfChanged(node, EDUCATION_ABROAD_EYEBROW)
            }
            document.querySelectorAll('a[href]').forEach((a) => {
              const h = a.getAttribute('href') || ''
              if (!h || h.startsWith('#')) return
              if (h.includes('EducationAbroadPeerMentors')) unifyCardEyebrow(a)
              else if (isGlobalAbroadHref(h)) unifyCardEyebrow(a)
              else if (h === isssScholarshipsHref) unifyCardEyebrow(a)
            })
            const pageTitle = findLeafTextNode('h1,h2,h3,div,span', (t) => t === 'study abroad')
            if (pageTitle) setTextIfChanged(pageTitle, 'Education abroad')
          }
          const financialTileNode = findNodeByText(document, 'Financial')
          if (financialTileNode) setTextIfChanged(financialTileNode, 'Financial resources')
          document.querySelectorAll('a[target="_blank"]').forEach((a) => {
            const href = a.getAttribute('href') || ''
            if (!href || href.startsWith('#') || href.toLowerCase().startsWith('javascript:')) return
            if (href.startsWith('mailto:') || href.startsWith('tel:')) return
            a.removeAttribute('target')
            const rel = (a.getAttribute('rel') || '').toLowerCase().trim()
            if (TARGET_REL_VALUES.has(rel)) {
              a.removeAttribute('rel')
            }
          })
          document.querySelectorAll('a[href]').forEach((card) => {
            const href = card.getAttribute('href') || ''
            if (!href || href.startsWith('#')) return
            const qrHref = href === sprintaxCodeCardHref ? sprintaxCodeQrHref : href
            const qrLabel = href === sprintaxCodeCardHref ? 'Sprintax code QR' : `QR code for ${getDisplayUrl(qrHref)}`
            ensureQrToggleForCard(card, qrHref, qrLabel)
          })
          applyIpadResponsiveStyles()
          } finally {
            isApplyingUpdate = false
          }
        }
        applyUpdate()
        new MutationObserver(applyUpdate).observe(document.body, { childList: true, subtree: true })
        window.addEventListener('resize', applyUpdate, { passive: true })
        window.addEventListener('orientationchange', applyUpdate, { passive: true })
      })()
